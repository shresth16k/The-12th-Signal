name: Frontend Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Run Frontend Tests & Accessibility Scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run Vitest Unit Tests
        run: |
          cd frontend
          npx vitest run

      - name: Install Playwright Chromium
        run: |
          cd frontend
          npx playwright install chromium

      - name: Start Frontend Dev Server
        run: |
          cd frontend
          npm run dev &
          # Wait for server to start on port 5173
          for i in {1..30}; do
            curl -s http://localhost:5173 && break || sleep 1
          done

      - name: Run Accessibility Scan
        run: |
          cd frontend
          node run_accessibility_scan.cjs

      - name: Verify Accessibility Scan Results
        run: |
          node -e "
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('frontend/accessibility_report.json', 'utf8'));
          let violationsCount = 0;
          let errorsCount = 0;
          for (const [page, data] of Object.entries(report)) {
            if (data.error) {
              console.error('Error scanning page ' + page + ': ' + data.error);
              errorsCount++;
            } else if (data.violations && data.violations.length > 0) {
              console.error('Page ' + page + ' has ' + data.violations.length + ' accessibility violations.');
              violationsCount += data.violations.length;
            }
          }
          if (violationsCount > 0 || errorsCount > 0) {
            console.error('Accessibility check failed: ' + violationsCount + ' violations, ' + errorsCount + ' errors.');
            process.exit(1);
          }
          console.log('Accessibility check passed!');
          "
